<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#065f46">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kohvilogi">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Kohvilogi">
    <link rel="manifest" href="/manifest.json">
    <title>Kohvilogi — Kaart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #111827; color: #e5e7eb; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 60px; z-index: 1; }
        .leaflet-container { background: #111827 !important; }
        .coffee-popup .leaflet-popup-content-wrapper {
            background: #1f2937; color: #e5e7eb; border-radius: 0.75rem;
            border: 1px solid #374151; font-size: 13px;
        }
        .coffee-popup .leaflet-popup-tip { background: #1f2937; }
        .coffee-popup .leaflet-popup-close-button { color: #9ca3af; }
        .region-popup .leaflet-popup-content-wrapper {
            background: #1a1a2e; color: #e5e7eb; border-radius: 0.75rem;
            border: 1px solid #4a5568; font-size: 13px;
        }
        .region-popup .leaflet-popup-tip { background: #1a1a2e; }
        .region-popup .leaflet-popup-close-button { color: #9ca3af; }
        .leaflet-control-zoom a {
            background: #1f2937 !important; color: #e5e7eb !important;
            border-color: #374151 !important;
        }
        .leaflet-control-zoom a:hover { background: #374151 !important; }
        .leaflet-control-attribution {
            background: rgba(17,24,39,0.8) !important; color: #6b7280 !important;
            font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: #34d399 !important; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: #1f2937; border-top: 1px solid #374151;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .bottom-nav a {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px 0 4px; color: #6b7280; text-decoration: none; font-size: 10px;
            transition: color 0.15s;
        }
        .bottom-nav a.active { color: #34d399; }
        .bottom-nav a span.icon { font-size: 20px; line-height: 1; margin-bottom: 2px; }

        /* Stats overlay */
        .stats-bar {
            position: fixed; top: 8px; left: 8px; right: 8px; z-index: 500;
            display: flex; gap: 6px; pointer-events: none;
        }
        .stats-bar > div {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(8px);
            border: 1px solid #374151; border-radius: 8px;
            padding: 6px 10px; text-align: center; pointer-events: auto;
        }
        .stats-bar .num { color: #34d399; font-weight: 700; font-size: 14px; line-height: 1.2; }
        .stats-bar .lbl { color: #6b7280; font-size: 9px; }

        /* Layer toggles */
        .layer-bar {
            position: fixed; top: 56px; left: 8px; z-index: 500;
            display: flex; gap: 4px;
        }
        .layer-btn {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(8px);
            border: 1px solid #374151; border-radius: 6px;
            padding: 4px 8px; font-size: 10px; color: #9ca3af;
            cursor: pointer; transition: all 0.15s;
        }
        .layer-btn.active { border-color: #34d399; color: #34d399; }

        /* Legend */
        .legend-box {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(8px);
            border: 1px solid #374151; border-radius: 8px;
            padding: 6px 10px; color: #9ca3af; font-size: 10px; line-height: 1.8;
        }
        .legend-box .dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 5px; vertical-align: middle;
        }

        /* Country list sheet */
        .sheet-overlay { display: none; position: fixed; inset: 0; z-index: 900; background: rgba(0,0,0,0.5); }
        .sheet-overlay.open { display: block; }
        .sheet {
            position: fixed; bottom: 60px; left: 0; right: 0; z-index: 901;
            background: #1f2937; border-top: 1px solid #374151;
            border-radius: 16px 16px 0 0; max-height: 50vh; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.25s ease-out;
        }
        .sheet.open { transform: translateY(0); }
        .sheet-handle { width: 36px; height: 4px; background: #4b5563; border-radius: 2px; margin: 8px auto; }

        /* Add coffee modal */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.6); align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1f2937; border-top: 1px solid #374151;
            border-radius: 16px 16px 0 0; width: 100%; max-width: 480px;
            padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            max-height: 80vh; overflow-y: auto;
        }
        .modal-handle { width: 36px; height: 4px; background: #4b5563; border-radius: 2px; margin: 0 auto 12px; }
        .modal select, .modal input {
            background: #374151; border: 1px solid #4b5563; color: #e5e7eb;
            border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%;
        }
        .modal select:focus, .modal input:focus { outline: none; border-color: #34d399; }
        .modal label { color: #9ca3af; font-size: 11px; display: block; margin-bottom: 4px; margin-top: 10px; }
        .modal .btn-primary {
            background: #059669; color: white; border: none; border-radius: 8px;
            padding: 12px; font-weight: 600; font-size: 14px; width: 100%; margin-top: 14px;
        }
        .modal .btn-primary:active { background: #047857; }
        .modal .btn-cancel {
            background: transparent; color: #6b7280; border: none;
            padding: 10px; font-size: 13px; width: 100%; margin-top: 4px;
        }
        .modal .loc-hint { color: #6b7280; font-size: 11px; margin-top: 4px; }

        /* Year picker */
        .year-opt {
            padding: 6px 12px; color: #d1d5db; font-size: 12px;
            cursor: pointer; border-radius: 4px; white-space: nowrap;
        }
        .year-opt:hover { background: #374151; }
        .year-opt.sel { color: #34d399; }

        /* QR modal */
        .qr-modal { text-align: center; }
        .qr-modal canvas { margin: 12px auto; border-radius: 8px; }
        .qr-share-text { font-size: 12px; color: #9ca3af; word-break: break-all; margin: 8px 0; }
    </style>
</head>
<body>
    <!-- Stats bar -->
    <div class="stats-bar">
        <div><div class="num" id="stat-countries">·</div><div class="lbl">riiki</div></div>
        <div><div class="num" id="stat-streak">·</div><div class="lbl">streak</div></div>
        <div><div class="num" id="stat-progress">·</div><div class="lbl">maailmast</div></div>
    </div>

    <!-- Layer toggles + year filter -->
    <div class="layer-bar">
        <button class="layer-btn active" id="btn-markers" onclick="toggleLayer('markers')">📍 Kohv</button>
        <button class="layer-btn active" id="btn-regions" onclick="toggleLayer('regions')">🌱 Põllud</button>
        <button class="layer-btn" id="btn-routes" onclick="toggleLayer('routes')">✈️ Rajad</button>
        <div style="position:relative;">
            <button class="layer-btn" id="btn-year" onclick="toggleYearPicker()">📅 <span id="year-label">Kõik</span></button>
            <div id="year-picker" style="display:none;position:absolute;top:100%;left:0;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:4px;z-index:600;min-width:80px;">
                <div class="year-opt" onclick="setYear('all')">Kõik</div>
            </div>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Country list sheet -->
    <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="px-4 pb-4">
            <h3 class="text-sm font-semibold text-gray-300 mb-2">📖 Riikide nimekiri</h3>
            <div id="country-list" class="space-y-1 text-sm"></div>
        </div>
    </div>

    <!-- Add coffee modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h3 class="text-base font-bold text-emerald-400 mb-1">☕ Lisa kohv siia</h3>
            <p class="text-gray-500 text-xs mb-2" id="modal-coords"></p>
            <form id="add-form" method="post" action="/add">
                <label>Kohvi tüüp</label>
                <select name="coffee_type" required>
                    <option value="" disabled selected>Vali tüüp</option>
                    <option>Espresso</option><option>Americano</option><option>Cappuccino</option>
                    <option>Latte</option><option>Flat White</option><option>Macchiato</option>
                    <option>Mocha</option><option>Ristretto</option><option>Lungo</option>
                    <option>Cold Brew</option><option>Filterkohv</option><option>Muu</option>
                </select>
                <div style="display:flex;gap:8px;">
                    <div style="flex:2">
                        <label>Summa</label>
                        <input type="text" name="amount" placeholder="3.50" required pattern="[0-9]+([,.][0-9]+)?">
                    </div>
                    <div style="flex:1">
                        <label>Valuuta</label>
                        <select name="currency">
                            <option value="EUR" selected>EUR</option>
                            <option value="USD">USD</option>
                            <option value="GBP">GBP</option>
                            <option value="SEK">SEK</option>
                            <option value="NOK">NOK</option>
                            <option value="DKK">DKK</option>
                            <option value="CHF">CHF</option>
                            <option value="JPY">JPY</option>
                            <option value="AUD">AUD</option>
                            <option value="CAD">CAD</option>
                        </select>
                    </div>
                </div>
                <label>Asukoht</label>
                <input type="text" name="location" placeholder="Linn, koht" id="modal-location">
                <label>Riik</label>
                <input type="text" name="country" placeholder="EE" maxlength="2" class="uppercase" id="modal-country">
                <input type="hidden" name="latitude" id="modal-lat" value="0">
                <input type="hidden" name="longitude" id="modal-lon" value="0">
                <label>Märkmed</label>
                <input type="text" name="notes" placeholder="Valikuline">
                <button type="submit" class="btn-primary">Lisa ☕</button>
                <button type="button" class="btn-cancel" onclick="closeModal()">Tühista</button>
            </form>
        </div>
    </div>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
        <div style="display:flex;justify-content:space-around;align-items:stretch;height:56px;">
            <a href="/" class="flex-1">
                <span class="icon">➕</span>
                <span>Lisa</span>
            </a>
            <a href="/map" class="flex-1 active">
                <span class="icon">🗺️</span>
                <span>Kaart</span>
            </a>
            <a href="/stats" class="flex-1">
                <span class="icon">📊</span>
                <span>Stat</span>
            </a>
            <a href="#" class="flex-1" onclick="openSheet();return false;">
                <span class="icon">📖</span>
                <span>Riigid</span>
            </a>
            <a href="#" class="flex-1" onclick="openQR();return false;">
                <span class="icon">🔗</span>
                <span>Jaga</span>
            </a>
        </div>
    </nav>

    <!-- QR Share modal -->
    <div class="modal-overlay" id="qr-overlay" onclick="closeQR(event)">
        <div class="modal qr-modal" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h3 class="text-base font-bold text-emerald-400 mb-1">📤 Jaga oma kohvipassi</h3>
            <canvas id="qr-canvas" width="200" height="200"></canvas>
            <p class="qr-share-text" id="qr-text"></p>
            <button class="btn-primary" onclick="copyShareLink()">Kopeeri link</button>
            <button class="btn-cancel" onclick="closeQR()">Sulge</button>
        </div>
    </div>

    <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([20, 0], 2);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    // Layer groups
    const markersLayer = L.layerGroup().addTo(map);
    const regionsLayer = L.layerGroup().addTo(map);
    const routesLayer = L.layerGroup();

    function toggleLayer(name) {
        const btn = document.getElementById('btn-' + name);
        const layer = { markers: markersLayer, regions: regionsLayer, routes: routesLayer }[name];
        if (map.hasLayer(layer)) { map.removeLayer(layer); btn.classList.remove('active'); }
        else { map.addLayer(layer); btn.classList.add('active'); }
    }

    // Sheet
    function openSheet() {
        document.getElementById('sheet').classList.add('open');
        document.getElementById('sheet-overlay').classList.add('open');
    }
    function closeSheet() {
        document.getElementById('sheet').classList.remove('open');
        document.getElementById('sheet-overlay').classList.remove('open');
    }

    // Modal
    let clickLat = 0, clickLon = 0;
    function openModal(lat, lon) {
        clickLat = lat; clickLon = lon;
        document.getElementById('modal-lat').value = lat.toFixed(6);
        document.getElementById('modal-lon').value = lon.toFixed(6);
        document.getElementById('modal-coords').textContent = lat.toFixed(4) + ', ' + lon.toFixed(4);
        document.getElementById('modal-location').value = '';
        document.getElementById('modal-country').value = '';
        document.getElementById('modal-overlay').classList.add('open');
        setTimeout(() => document.getElementById('modal-location').focus(), 100);
    }
    function closeModal(e) {
        if (!e || e.target === document.getElementById('modal-overlay') || e.target.classList.contains('btn-cancel')) {
            document.getElementById('modal-overlay').classList.remove('open');
        }
    }

    // Reverse geocode on location input
    document.getElementById('modal-location').addEventListener('change', function() {
        const loc = this.value.trim();
        if (!loc) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(loc)}&limit=1`, {
            headers: { 'User-Agent': 'Kohvilogi/1.0' }
        })
        .then(r => r.json())
        .then(data => {
            if (data && data[0]) {
                document.getElementById('modal-lat').value = data[0].lat;
                document.getElementById('modal-lon').value = data[0].lon;
                // Try to extract country code
                if (data[0].address && data[0].address.country_code) {
                    document.getElementById('modal-country').value = data[0].address.country_code.toUpperCase();
                }
            }
        })
        .catch(() => {});
    });

    // Map click → add coffee
    map.on('click', function(e) {
        openModal(e.latlng.lat, e.latlng.lng);
    });

    // Region icon
    function regionIcon() {
        return L.divIcon({
            html: '<span style="font-size:12px;opacity:0.7">🌱</span>',
            className: '', iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -8]
        });
    }

    // Load data
    fetch('/api/world')
        .then(r => r.json())
        .then(data => {
            document.getElementById('stat-countries').textContent = data.total_countries || 0;

            const allMarkers = [];
            const uniqueLocations = new Set();

            if (data.coordinates) {
                data.coordinates.forEach(c => {
                    if (c.latitude && c.longitude) {
                        uniqueLocations.add(c.location || c.country);
                        const marker = L.circleMarker([c.latitude, c.longitude], {
                            radius: 6, fillColor: '#34d399', color: '#065f46',
                            weight: 2, opacity: 1, fillOpacity: 0.85
                        }).bindPopup(`
                            <b>${c.coffee_type || 'Kohv'}</b><br>
                            <span style="color:#9ca3af">${c.location || ''} (${c.country})</span><br>
                            <small style="color:#6b7280">${c.date}</small>
                        `, { className: 'coffee-popup' });
                        markersLayer.addLayer(marker);
                        allMarkers.push([c.latitude, c.longitude]);
                    }
                });
            }
            // Store for year filtering
            if (data.coordinates) storeMarkersData(data.coordinates);
            document.getElementById('stat-locations').textContent = uniqueLocations.size;

            if (data.regions) {
                data.regions.forEach(r => {
                    L.marker([r.lat, r.lon], { icon: regionIcon() })
                        .bindPopup(`
                            <b>🌱 ${r.name}</b><br>
                            <span style="color:#9ca3af">${r.country} · ${r.type}</span><br>
                            <span style="color:#d1d5db;font-size:12px">${r.desc}</span>
                        `, { className: 'region-popup' })
                        .addTo(regionsLayer);
                });
            }

            if (data.coordinates && data.coordinates.length > 1) {
                const sorted = [...data.coordinates]
                    .filter(c => c.latitude && c.longitude)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                for (let i = 0; i < sorted.length - 1; i++) {
                    const a = sorted[i], b = sorted[i + 1];
                    if (a.country !== b.country) {
                        L.polyline(
                            [[a.latitude, a.longitude], [b.latitude, b.longitude]],
                            { color: '#34d399', weight: 1.5, opacity: 0.35, dashArray: '4 6' }
                        ).bindPopup(`<span style="color:#9ca3af;font-size:11px">${a.location||a.country} → ${b.location||b.country}</span>`, { className: 'coffee-popup' })
                        .addTo(routesLayer);
                    }
                }
            }

            if (allMarkers.length > 0) {
                map.fitBounds(L.latLngBounds(allMarkers).pad(0.15));
            }

            const listEl = document.getElementById('country-list');
            if (data.countries && data.countries.length > 0) {
                data.countries.sort((a, b) => b.drink_count - a.drink_count);
                data.countries.forEach(c => {
                    const d = document.createElement('div');
                    d.className = 'flex justify-between items-center py-1.5 border-b border-gray-700/50 last:border-0';
                    d.innerHTML = `<span>${c.flag||'🏳️'} ${c.country_name||c.country}</span><span style="color:#34d399;font-weight:600">${c.drink_count}x</span>`;
                    listEl.appendChild(d);
                });
            } else {
                listEl.innerHTML = '<p class="text-gray-500 text-center py-4">Veel pole kohvi maailmas juuaud.<br><span style="font-size:12px">Kliki kaardil või lisa kohv!</span></p>';
            }

            // Stats bar
            fetch('/api/stats')
                .then(r => r.json())
                .then(s => {
                    document.getElementById('stat-streak').textContent = s.streak || 0;
                    document.getElementById('stat-progress').textContent = (s.world_progress || 0) + '%';
                })
                .catch(() => {});
        })
        .catch(err => console.error('Failed:', err));

    // Legend
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
        const d = L.DomUtil.create('div', 'legend-box');
        d.innerHTML = '<div><span class="dot" style="background:#34d399"></span>Kohvikoht</div><div><span class="dot" style="background:#22c55e;opacity:0.5"></span>Viinapõld</div><div style="color:#6b7280;font-size:9px;margin-top:4px">👆 Kliki kaardil lisamiseks</div>';
        return d;
    };
    legend.addTo(map);

    // === Year filter ===
    let allMarkersData = [];
    let currentYear = 'all';

    function toggleYearPicker() {
        const p = document.getElementById('year-picker');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function setYear(y) {
        currentYear = y;
        document.getElementById('year-label').textContent = y === 'all' ? 'Kõik' : y;
        document.getElementById('year-picker').style.display = 'none';
        // Update year picker selection
        document.querySelectorAll('.year-opt').forEach(el => {
            el.classList.toggle('sel', el.textContent.trim() === (y === 'all' ? 'Kõik' : y));
        });
        filterMarkersByYear();
    }

    function filterMarkersByYear() {
        markersLayer.clearLayers();
        allMarkersData.forEach(m => {
            if (currentYear === 'all' || m.date.startsWith(currentYear)) {
                const marker = L.circleMarker([m.lat, m.lon], {
                    radius: 6, fillColor: '#34d399', color: '#065f46',
                    weight: 2, opacity: 1, fillOpacity: 0.85
                }).bindPopup(`<b>${m.coffee_type}</b><br><span style="color:#9ca3af">${m.location} (${m.country})</span><br><small style="color:#6b7280">${m.date}</small>`, { className: 'coffee-popup' });
                markersLayer.addLayer(marker);
            }
        });
    }

    // === Haptic feedback ===
    function haptic() {
        if (navigator.vibrate) navigator.vibrate(15);
    }

    // Hook into add form submit
    document.getElementById('add-form').addEventListener('submit', haptic);

    // === QR Share ===
    let shareUrl = '';
    async function openQR() {
        haptic();
        const r = await fetch('/api/share');
        const d = await r.json();
        shareUrl = window.location.origin + d.share_url;
        document.getElementById('qr-text').textContent = d.text;
        document.getElementById('qr-overlay').classList.add('open');
        // Simple QR code using API
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(0, 0, 200, 200);
        // Use qrserver.com API for QR
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(shareUrl)}&bgcolor=1f2937&color=34d399`;
        img.onload = () => {
            ctx.drawImage(img, 0, 0, 200, 200);
        };
    }
    function closeQR(e) {
        if (!e || e.target === document.getElementById('qr-overlay') || e.target.classList.contains('btn-cancel')) {
            document.getElementById('qr-overlay').classList.remove('open');
        }
    }
    function copyShareLink() {
        navigator.clipboard.writeText(shareUrl).then(() => {
            haptic();
            const btn = document.querySelector('#qr-overlay .btn-primary');
            btn.textContent = 'Kopeeritud!';
            setTimeout(() => btn.textContent = 'Kopeeri link', 1500);
        });
    }

    // === Top 3 coffees per country (shown in sheet) ===
    async function loadTop3() {
        try {
            const r = await fetch('/api/world/top3');
            const data = await r.json();
            const listEl = document.getElementById('country-list');
            if (Object.keys(data).length > 0) {
                let html = '';
                for (const [cc, info] of Object.entries(data)) {
                    html += `<div style="padding:8px 0;border-bottom:1px solid #374151;">`;
                    html += `<div style="font-weight:600;color:#e5e7eb;margin-bottom:4px;">${info.flag} ${info.country_name} <span style="color:#6b7280;font-size:11px">(${cc})</span></div>`;
                    info.coffees.forEach((c, i) => {
                        const medal = ['🥇','🥈','🥉'][i] || '•';
                        html += `<div style="color:#9ca3af;font-size:12px;padding:2px 0;">${medal} ${c.type} <span style="color:#34d399">×${c.count}</span></div>`;
                    });
                    html += '</div>';
                }
                listEl.innerHTML = html;
            }
        } catch(e) {}
    }
    loadTop3();

    // === Year data for filter ===
    async function loadYearData() {
        try {
            const r = await fetch('/api/world/by-year');
            const data = await r.json();
            const picker = document.getElementById('year-picker');
            // Keep "Kõik" option, add years
            picker.innerHTML = '<div class="year-opt sel" onclick="setYear(\'all\')">Kõik</div>';
            Object.keys(data).sort().reverse().forEach(y => {
                const total = data[y].total;
                picker.innerHTML += `<div class="year-opt" onclick="setYear('${y}')">${y} <span style="color:#6b7280">(${total})</span></div>`;
            });
        } catch(e) {}
    }
    loadYearData();

    // Store markers data for year filtering
    // This needs to be called after markers are loaded
    function storeMarkersData(coordinates) {
        allMarkersData = coordinates.filter(c => c.latitude && c.longitude).map(c => ({
            lat: c.latitude, lon: c.longitude,
            coffee_type: c.coffee_type || 'Kohv',
            location: c.location || '', country: c.country, date: c.date,
        }));
    }
    </script>
